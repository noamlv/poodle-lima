name: Verificar enlaces

on:
  schedule:
    - cron: '0 10 * * 1'
  workflow_dispatch:

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Check external links
        uses: lycheeverse/lychee-action@v1
        with:
          args: --verbose --no-progress --exclude 'linkedin.com|facebook.com|wa.me' '*.html' 'README.md'
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
      - name: Create issue if broken links
        if: failure()
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Enlaces rotos detectados',
              body: 'El checker de enlaces encontro URLs que no responden. Revisar dashboard y actualizar datos.'
            })
